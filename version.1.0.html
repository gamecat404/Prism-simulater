<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quantum & Optics Laboratory Simulator</title>
    <style>
        body { margin: 0; background-color: #121214; color: #e1e1e6; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #toolbox { width: 280px; background-color: #1a1a1e; border-right: 2px solid #29292e; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .section-title { font-size: 12px; font-weight: bold; color: #00adb5; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; border-bottom: 1px solid #29292e; padding-bottom: 5px; }
        .tool-btn { background-color: #29292e; border: 1px solid #3f3f46; color: #e1e1e6; padding: 10px; text-align: left; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .tool-btn:hover { background-color: #3f3f46; border-color: #00adb5; }
        #canvas-container { flex: 1; position: relative; background: #0a0a0c; }
        canvas { display: block; width: 100%; height: 100%; }
        #python-terminal { position: absolute; bottom: 20px; right: 20px; width: 360px; background: rgba(20, 20, 25, 0.95); border: 2px solid #00adb5; border-radius: 8px; padding: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); display: none; }
        .term-header { font-size: 12px; font-weight: bold; color: #00adb5; margin-bottom: 6px; display: flex; justify-content: space-between; }
        textarea { width: 100%; height: 140px; background: #050507; color: #38bdf8; border: 1px solid #3f3f46; font-family: monospace; font-size: 11px; padding: 8px; box-sizing: border-box; resize: none; border-radius: 4px; }
        .term-out { font-family: monospace; font-size: 11px; color: #4ade80; margin-top: 6px; background: #000; padding: 6px; height: 50px; overflow-y: auto; border-radius: 4px; }
        .controls-info { font-size: 11px; color: #71717a; line-height: 1.5; margin-top: auto; background: #141416; padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="toolbox">
        <div class="section-title">💡 Light Sources</div>
        <button class="tool-btn" onclick="spawn('box-1')">Light Box (1 Beam) <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('box-3')">Light Box (3 Beams) <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('box-5')">Light Box (5 Beams) <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('laser-rgb')">RGB Laser Source <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('laser-hene')">He-Ne Laser (Red) <span>[+]</span></button>

        <div class="section-title">🔮 Prisms & Optics</div>
        <button class="tool-btn" onclick="spawn('prism-triangle')">Triangle Prism <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('prism-rectangle')">Rectangle Prism <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('prism-circle')">Circle Prism <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('prism-trapezoid')">Trapezoid Prism <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('prism-pyramid')">Pyramid Prism <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('prism-cone')">Cone Prism <span>[+]</span></button>

        <div class="section-title">🔍 Lenses & Mirrors</div>
        <button class="tool-btn" onclick="spawn('lens-convex')">Convex Lens <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('lens-concave')">Concave Lens <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('mirror-convex')">Convex Mirror <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('mirror-concave')">Concave Mirror <span>[+]</span></button>

        <div class="section-title">⚡ Electronics & IoT</div>
        <button class="tool-btn" onclick="spawn('light-sensor')">Light Sensor <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('battery')">Power Battery <span>[+]</span></button>
        <button class="tool-btn" onclick="spawn('computer')">Control Computer <span>[+]</span></button>

        <div class="controls-info">
            <strong>[Controls]</strong><br>
            • Drag & Drop: Left Click<br>
            • Fine Rotate: Mouse Wheel (0.5°)<br>
            • Delete Object: Press [Delete] key
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>

        <div id="python-terminal">
            <div class="term-header">
                <span>💻 Embedded Python IDE (IoT Controller)</span>
                <span style="color:#ef4444; cursor:pointer; font-weight:bold;" onclick="document.getElementById('python-terminal').style.display='none'">[X]</span>
            </div>
            <textarea id="pyCode" spellcheck="false"># Python IoT Script v1.0
def on_laser_signal(sensor):
    if sensor.is_triggered():
        print("🚨 [BEEP!] Laser Detected! Triggering Alarm.")
        set_circuit_relay(False) # Turn off main circuit
    else:
        set_circuit_relay(True)  # Keep circuit active</textarea>
            <div id="pyOut" class="term-out">System: Initialization complete. Waiting for laser...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let objects = [];
        let selectedObj = null;
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Infinite Spawner Logic
        function spawn(type) {
            let obj = {
                id: Date.now() + Math.random(),
                type: type,
                x: canvas.width / 2 + (Math.random() * 60 - 30),
                y: canvas.height / 2 + (Math.random() * 60 - 30),
                angle: 0,
                width: 70,
                height: 50,
                triggered: false
            };

            // Custom dimensions per item type
            if(type.includes('lens') || type.includes('mirror')) { obj.width = 16; obj.height = 90; }
            else if(type.includes('prism-')) { obj.width = 65; obj.height = 65; }
            else if(type === 'light-sensor') { obj.width = 45; obj.height = 45; }
            else if(type === 'computer') { obj.width = 85; obj.height = 60; }
            else if(type === 'battery') { obj.width = 55; obj.height = 40; }

            objects.push(obj);
            selectedObj = obj;
        }

        // Ray Tracing Logic & Physics Simulation
        function traceLasers() {
            let beams = [];

            // 1. Generate initial light beams from sources
            objects.forEach(obj => {
                if (obj.type.startsWith('box-') || obj.type.startsWith('laser-')) {
                    let count = 1;
                    let color = '#ff3333';
                    if (obj.type === 'box-3') count = 3;
                    if (obj.type === 'box-5') count = 5;
                    if (obj.type === 'laser-rgb') color = 'rgb';

                    for (let i = 0; i < count; i++) {
                        let offsetDir = (i - (count - 1) / 2) * 14;
                        let rad = obj.angle * Math.PI / 180;
                        let startX = obj.x + Math.cos(rad) * (obj.width / 2);
                        let startY = obj.y + Math.sin(rad) * (obj.width / 2);
                        
                        if (count > 1) {
                            startX += Math.sin(rad) * offsetDir;
                            startY -= Math.cos(rad) * offsetDir;
                        }

                        let beamColors = color === 'rgb' ? ['#ff3333', '#33ff33', '#3333ff'] : [color];
                        beamColors.forEach((c, idx) => {
                            let spread = color === 'rgb' ? (idx - 1) * 3.5 : 0;
                            beams.push({ x: startX, y: startY, angle: obj.angle + spread, color: c });
                        });
                    }
                }
            });

            // Reset sensor states before collision math
            objects.forEach(o => { if(o.type === 'light-sensor') o.triggered = false; });

            // 2. Dynamic Ray Collision & Rendering
            beams.forEach(beam => {
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = beam.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = beam.color;

                ctx.beginPath();
                ctx.moveTo(beam.x, beam.y);

                let rad = beam.angle * Math.PI / 180;
                let endX = beam.x + Math.cos(rad) * 2000;
                let endY = beam.y + Math.sin(rad) * 2000;

                // Simple Ray-Casting box checks
                objects.forEach(obj => {
                    if (obj.type === 'light-sensor') {
                        let dist = Math.hypot(obj.x - (beam.x + Math.cos(rad) * 150), obj.y - (beam.y + Math.sin(rad) * 150));
                        if (dist < 55) {
                            obj.triggered = true;
                            endX = obj.x - Math.cos(rad) * 10;
                            endY = obj.y - Math.sin(rad) * 10;
                        }
                    }
                    if (obj.type.includes('prism') || obj.type.includes('lens')) {
                        let dist = Math.hypot(obj.x - (beam.x + Math.cos(rad) * 120), obj.y - (beam.y + Math.sin(rad) * 120));
                        if (dist < 45) {
                            endX = obj.x;
                            endY = obj.y;
                            // Visual placeholder for refraction point
                        }
                    }
                });

                ctx.lineTo(endX, endY);
                ctx.stroke();
            });
            ctx.shadowBlur = 0; // Reset canvas filter
        }

        // Draw Loop
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Tech Laboratory Grid Line Background
            ctx.strokeStyle = '#16161a';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            traceLasers();

            // Render Modules
            objects.forEach(obj => {
                ctx.save();
                ctx.translate(obj.x, obj.y);
                ctx.rotate(obj.angle * Math.PI / 180);

                // Highlight Selection Boundary
                if (obj === selectedObj) {
                    ctx.strokeStyle = '#00adb5';
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(-obj.width/2 - 5, -obj.height/2 - 5, obj.width + 10, obj.height + 10);
                }

                // Render styles based on UI asset type
                if (obj.type.startsWith('box-') || obj.type.startsWith('laser-')) {
                    ctx.fillStyle = '#27272a';
                    ctx.fillRect(-obj.width/2, -obj.height/2, obj.width, obj.height);
                    ctx.fillStyle = '#a1a1aa';
                    ctx.fillRect(obj.width/2 - 6, -6, 6, 12);
                } 
                else if (obj.type.startsWith('prism-')) {
                    ctx.fillStyle = 'rgba(14, 165, 233, 0.2)';
                    ctx.strokeStyle = '#38bdf8';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    if(obj.type === 'prism-triangle' || obj.type === 'prism-pyramid') {
                        ctx.moveTo(0, -obj.height/2); ctx.lineTo(obj.width/2, obj.height/2); ctx.lineTo(-obj.width/2, obj.height/2);
                    } else if(obj.type === 'prism-rectangle') {
                        ctx.rect(-obj.width/2, -obj.height/2, obj.width, obj.height);
                    } else if(obj.type === 'prism-circle' || obj.type === 'prism-cone') {
                        ctx.arc(0, 0, obj.width/2, 0, Math.PI*2);
                    } else if(obj.type === 'prism-trapezoid') {
                        ctx.moveTo(-obj.width/3, -obj.height/2); ctx.lineTo(obj.width/3, -obj.height/2);
                        ctx.lineTo(obj.width/2, obj.height/2); ctx.lineTo(-obj.width/2, obj.height/2);
                    }
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                } 
                else if (obj.type.includes('lens') || obj.type.includes('mirror')) {
                    ctx.strokeStyle = obj.type.includes('mirror') ? '#fbbf24' : '#34d399';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(0, -obj.height/2);
                    ctx.quadraticCurveTo(obj.type.includes('convex') ? 14 : -14, 0, 0, obj.height/2);
                    ctx.stroke();
                }
                else if (obj.type === 'light-sensor') {
                    ctx.fillStyle = obj.triggered ? '#ef4444' : '#1f2937';
                    ctx.fillRect(-obj.width/2, -obj.height/2, obj.width, obj.height);
                    ctx.strokeStyle = '#f3f4f6';
                    ctx.strokeRect(-obj.width/2, -obj.height/2, obj.width, obj.height);
                    if(obj.triggered) {
                        ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif';
                        ctx.fillText("⚡ SIGNAL", -20, 3);
                    }
                }
                else if (obj.type === 'battery') {
                    ctx.fillStyle = '#ea580c';
                    ctx.fillRect(-obj.width/2, -obj.height/2, obj.width, obj.height);
                    ctx.fillStyle = '#fff'; ctx.fillRect(obj.width/2, -5, 3, 10);
                }
                else if (obj.type === 'computer') {
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(-obj.width/2, -obj.height/2, obj.width, obj.height);
                    ctx.strokeStyle = '#38bdf8'; ctx.strokeRect(-obj.width/2, -obj.height/2, obj.width, obj.height);
                    ctx.fillStyle = '#22c55e'; ctx.font = '10px monospace'; ctx.fillText("Python OS", -26, 4);
                }

                ctx.restore();
            });

            // Live Python Terminal Logs Output Simulation
            let anySensor = objects.find(o => o.type === 'light-sensor');
            let termElement = document.getElementById('pyOut');
            if(anySensor && termElement) {
                if(anySensor.triggered) {
                    termElement.innerHTML = "<span style='color:#ef4444;'>🚨 [Python Script]: BEEP! Laser active on Sensor.<br>Circuit Relay Interrupted -> [POWER OFF]</span>";
                } else {
                    termElement.innerHTML = "💡 [Python Script]: Monitoring IoT Bus... Status OK.<br>Circuit Relay Active -> [POWER ON]";
                }
            }

            requestAnimationFrame(draw);
        }

        // Mouse Controls & Ultra-Fine 0.5-Degree Wheel Rotation Math
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mX = e.clientX - rect.left;
            const mY = e.clientY - rect.top;

            selectedObj = null;
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                if (Math.abs(mX - obj.x) < obj.width/2 && Math.abs(mY - obj.y) < obj.height/2) {
                    selectedObj = obj;
                    isDragging = true;
                    dragOffset.x = mX - obj.x;
                    dragOffset.y = mY - obj.y;
                    
                    if(obj.type === 'computer') {
                        document.getElementById('python-terminal').style.display = 'block';
                    }
                    break;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && selectedObj) {
                const rect = canvas.getBoundingClientRect();
                selectedObj.x = e.clientX - rect.left - dragOffset.x;
                selectedObj.y = e.clientY - rect.top - dragOffset.y;
            }
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        // Wheel listener: 0.5 degree fine rotation increments
        canvas.addEventListener('wheel', (e) => {
            if (selectedObj) {
                e.preventDefault();
                let deltaDir = e.deltaY > 0 ? 1 : -1;
                selectedObj.angle += deltaDir * 0.5; // Exactly 0.5-degree increments!
            }
        }, { passive: false });

        // Global Key Delete Handler
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' && selectedObj) {
                objects = objects.filter(o => o.id !== selectedObj.id);
                selectedObj = null;
            }
        });

        // Initialize Loop
        draw();
    </script>
</body>
</html>
